<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aweXome Ray — 열람 신청</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#c8f55a;--accent2:#8bffd4;
  --text:#f0ede6;--text2:#9996a0;--text3:#5c5968;
  --card:#13131c;--radius:12px;
  --mono:'DM Mono',monospace;--serif:'DM Serif Display',serif;--sans:'Pretendard',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:480px}
.logo{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.15em;margin-bottom:40px;text-align:center}
.hero-tag{font-family:var(--mono);font-size:10px;color:var(--accent2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hero-tag::before{content:'';display:block;width:16px;height:1px;background:var(--accent2)}
h1{font-family:var(--serif);font-size:36px;line-height:1.1;letter-spacing:-.02em;margin-bottom:12px}
h1 span{color:var(--accent);font-style:italic}
.desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.field{margin-bottom:16px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px;font-family:var(--mono);letter-spacing:.04em}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus{border-color:rgba(200,245,90,.4)}
.field input::placeholder{color:var(--text3)}
.submit-btn{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent);color:#0a0a0f;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px;letter-spacing:.04em}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.notice{font-size:11px;color:var(--text3);font-family:var(--mono);text-align:center;margin-top:16px;line-height:1.6}
.success{display:none;text-align:center;padding:32px 0}
.success-icon{width:56px;height:56px;border-radius:50%;background:rgba(200,245,90,.1);border:1px solid rgba(200,245,90,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success h2{font-family:var(--serif);font-size:24px;margin-bottom:8px}
.success p{font-size:13px;color:var(--text2);line-height:1.7}
.err{font-size:11px;color:#E24B4A;font-family:var(--mono);margin-top:8px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">aweXome Ray · IR</div>
  <div class="hero-tag">Investor Q&amp;A Portal</div>
  <h1>열람 <span>신청</span></h1>
  <p class="desc">아래 정보를 입력하시면 담당자 검토 후 개인 열람 링크를 이메일로 발송해 드립니다.</p>
<script>
  // 만료된 토큰으로 접속 시 안내
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('expired') === '1') {
    document.querySelector('.desc').innerHTML = 
      '⚠️ 보안상의 이유로 열람 링크는 <strong>1회만 유효</strong>합니다.<br>다시 열람하시려면 아래에서 재신청해 주세요.';
  }
</script>
  <div class="card">
    <div id="formWrap">
      <div class="field">
        <label>성함 *</label>
        <input id="name" type="text" placeholder="홍길동">
      </div>
      <div class="field">
        <label>소속 (회사/기관)</label>
        <input id="company" type="text" placeholder="ABC 인베스트먼트">
      </div>
      <div class="field">
        <label>이메일 *</label>
        <input id="email" type="email" placeholder="name@company.com">
      </div>
      <div class="err" id="errMsg"></div>
      <button class="submit-btn" id="submitBtn" onclick="submitRequest()">열람 신청하기</button>
      <p class="notice">신청 후 영업일 1일 이내 링크가 발송됩니다.<br>문의: ir@awexomeray.com</p>
    </div>
    <div class="success" id="successWrap">
      <div class="success-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c8f55a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>신청 완료</h2>
      <p>담당자 검토 후<br>열람 링크를 이메일로 보내드립니다.<br><br><span style="color:var(--accent)" id="confirmedEmail"></span></p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://aehromyvzjzbkfcqspqi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_p_9upkexFkkMsjEA4yOKlg_Ssu_n4o3';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function submitRequest() {
  const name = document.getElementById('name').value.trim();
  const company = document.getElementById('company').value.trim();
  const email = document.getElementById('email').value.trim();
  const errMsg = document.getElementById('errMsg');
  errMsg.style.display = 'none';

  if (!name) { showErr('성함을 입력해 주세요.'); return; }
  if (!email || !email.includes('@')) { showErr('올바른 이메일을 입력해 주세요.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '신청 중...';

  // 중복 신청 확인
  const { data: existing } = await sb.from('access_requests').select('id,status').eq('email', email).single();
  if (existing) {
    if (existing.status === 'approved') {
      showErr('이미 승인된 이메일입니다. 발송된 링크를 확인해 주세요.');
    } else {
      showErr('이미 신청된 이메일입니다. 검토 중입니다.');
    }
    btn.disabled = false;
    btn.textContent = '열람 신청하기';
    return;
  }

  const { error } = await sb.from('access_requests').insert({ name, company, email, status: 'pending' });
  if (error) { showErr('오류가 발생했습니다. 다시 시도해 주세요.'); btn.disabled = false; btn.textContent = '열람 신청하기'; return; }

  // 관리자 알림 발송
  await fetch('/.netlify/functions/notify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, company, email })
  });

  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('confirmedEmail').textContent = email;
  document.getElementById('successWrap').style.display = 'block';
}

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
