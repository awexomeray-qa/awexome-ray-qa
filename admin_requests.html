<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aweXome Ray — 신청 관리</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#c8f55a;--text:#f0ede6;--text2:#9996a0;--text3:#5c5968;
  --card:#13131c;--radius:12px;--mono:'DM Mono',monospace;--sans:'Pretendard',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.logo{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.15em}
.lock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.lock-title{font-family:var(--mono);font-size:13px;color:var(--text2)}
.lock-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 18px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;width:200px;text-align:center;letter-spacing:.2em}
.lock-btn{padding:10px 28px;border-radius:8px;border:none;background:var(--accent);color:#0a0a0f;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer}
.lock-err{font-size:11px;font-family:var(--mono);color:#E24B4A;display:none}
.main{padding:24px 32px}
.page-title{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:4px;letter-spacing:.05em}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.filter-row{display:flex;gap:6px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--accent);color:#0a0a0f;border-color:var(--accent)}
.count{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:12px}
.req-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.req-info{}
.req-name{font-size:14px;font-weight:500;margin-bottom:3px}
.req-meta{font-size:12px;color:var(--text2);margin-bottom:3px}
.req-email{font-family:var(--mono);font-size:11px;color:var(--accent2)}
.req-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.req-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.status-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:.05em}
.status-pending{background:rgba(250,199,117,.1);color:#FAC775;border:1px solid rgba(250,199,117,.3)}
.status-approved{background:rgba(200,245,90,.1);color:#c8f55a;border:1px solid rgba(200,245,90,.3)}
.status-rejected{background:rgba(226,75,74,.1);color:#E24B4A;border:1px solid rgba(226,75,74,.3)}
.approve-btn{padding:7px 14px;border-radius:6px;border:1px solid rgba(200,245,90,.3);background:rgba(200,245,90,.08);color:var(--accent);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s}
.approve-btn:hover{background:rgba(200,245,90,.15)}
.approve-btn:disabled{opacity:.4;cursor:not-allowed}
.reject-btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.reject-btn:hover{color:#E24B4A;border-color:rgba(226,75,74,.3)}
.resend-btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.resend-btn:hover{background:var(--bg3)}
.empty{padding:40px;text-align:center;font-size:12px;color:var(--text3);font-family:var(--mono)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid rgba(200,245,90,.3);border-radius:8px;padding:9px 14px;font-family:var(--mono);font-size:11px;color:var(--accent);z-index:200;transform:translateY(50px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:rgba(226,75,74,.4);color:#E24B4A}
.refresh-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="topbar">
  <span class="logo">aweXome Ray · 신청 관리</span>
  <button class="refresh-btn" onclick="loadRequests()">새로고침</button>
</div>

<!-- LOCK -->
<div class="lock-wrap" id="lockScreen">
  <div class="lock-title">관리자 비밀번호</div>
  <input class="lock-input" type="password" id="pwInp" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()">
  <div class="lock-err" id="pwErr">비밀번호가 올바르지 않습니다.</div>
  <button class="lock-btn" onclick="checkPw()">입장</button>
</div>

<!-- MAIN -->
<div class="main" id="mainContent" style="display:none">
  <div class="page-title">열람 신청 관리</div>
  <div class="page-sub">신청을 승인하면 투자자에게 개인 열람 링크가 자동 발송됩니다.</div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">대기중</button>
    <button class="filter-btn" onclick="setFilter('approved',this)">승인됨</button>
    <button class="filter-btn" onclick="setFilter('rejected',this)">거절됨</button>
  </div>
  <div class="count" id="countLabel"></div>
  <div id="reqList"></div>
</div>

<script>
const SUPABASE_URL = 'https://aehromyvzjzbkfcqspqi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_p_9upkexFkkMsjEA4yOKlg_Ssu_n4o3';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PW = 'awexome2026';

let allRequests = [];
let curFilter = 'all';

function checkPw() {
  if (document.getElementById('pwInp').value === ADMIN_PW) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadRequests();
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInp').value = '';
  }
}

async function loadRequests() {
  const { data, error } = await sb.from('access_requests').select('*').order('created_at', { ascending: false });
  if (error) { showToast('데이터 로드 실패', true); return; }
  allRequests = data || [];
  render();
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const data = curFilter === 'all' ? allRequests : allRequests.filter(r => r.status === curFilter);
  document.getElementById('countLabel').textContent = `${data.length}개`;
  const list = document.getElementById('reqList');
  if (!data.length) { list.innerHTML = '<div class="empty">신청 내역이 없습니다.</div>'; return; }

  // 이메일별 그룹핑
  const groups = {};
  data.forEach(r => {
    if (!groups[r.email]) groups[r.email] = [];
    groups[r.email].push(r);
  });

  list.innerHTML = Object.entries(groups).map(([email, rows]) => {
    const latest = rows[0];
    const time = new Date(latest.created_at).toLocaleString('ko-KR');
    const statusLabel = { pending: '대기중', approved: '승인됨', rejected: '거절됨' }[latest.status] || latest.status;
    const statusClass = `status-${latest.status}`;
    let actions = '';
    if (latest.status === 'pending') {
      actions = `<button class="approve-btn" onclick="approve(${latest.id},'${latest.name}','${latest.email}')">승인 + 링크 발송</button>
                 <button class="reject-btn" onclick="reject(${latest.id})">거절</button>`;
    } else if (latest.status === 'approved') {
      actions = `<button class="resend-btn" onclick="resend(${latest.id},'${latest.name}','${latest.email}','${latest.token}')">링크 재발송</button>`;
    }

    // 히스토리 행들
    const history = rows.length > 1 ? `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px">신청 히스토리 (${rows.length}회)</div>
        ${rows.map((r, i) => `
          <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;color:var(--text2)">
            <span style="font-family:var(--mono);color:var(--text3)">#${rows.length - i}</span>
            <span>${new Date(r.created_at).toLocaleString('ko-KR')}</span>
            <span class="status-badge status-${r.status}" style="font-size:9px;padding:1px 5px">${{ pending: '대기중', approved: '승인됨', rejected: '거절됨' }[r.status] || r.status}</span>
            ${r.last_accessed_at ? `<span style="color:var(--accent2)">열람: ${new Date(r.last_accessed_at).toLocaleString('ko-KR')}</span>` : ''}
          </div>`).join('')}
      </div>` : '';

    return `<div class="req-card">
      <div class="req-info">
        <div class="req-name">${latest.name} ${rows.length > 1 ? `<span style="font-family:var(--mono);font-size:10px;color:var(--accent);margin-left:6px">${rows.length}회 신청</span>` : ''}</div>
        <div class="req-meta">${latest.company || '소속 미입력'}</div>
        <div class="req-email">${email}</div>
        <div class="req-time">${time} 신청${latest.last_accessed_at ? ' · 마지막 접속: ' + new Date(latest.last_accessed_at).toLocaleString('ko-KR') : ''}${latest.request_ip ? ' · IP: ' + latest.request_ip : ''}</div>
        ${history}
      </div>
      <div class="req-actions">
        <span class="status-badge ${statusClass}">${statusLabel}</span>
        ${actions}
      </div>
    </div>`;
  }).join('');
}

async function approve(id, name, email) {
  if (!confirm(`${name}(${email})님을 승인하고 링크를 발송할까요?`)) return;
  const res = await fetch('/.netlify/functions/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, name, email })
  });
  const data = await res.json();
  if (!res.ok || data.error) { showToast('승인 실패: ' + (data.error || ''), true); return; }
  showToast(`${name}님께 링크가 발송되었습니다.`);
  loadRequests();
}

async function reject(id) {
  if (!confirm('이 신청을 거절하시겠습니까?')) return;
  const { error } = await sb.from('access_requests').update({ status: 'rejected' }).eq('id', id);
  if (error) { showToast('처리 실패', true); return; }
  showToast('거절 처리되었습니다.');
  loadRequests();
}

async function resend(id, name, email, token) {
  if (!confirm(`${name}님께 링크를 재발송할까요?`)) return;
  const res = await fetch('/.netlify/functions/approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, name, email, resend: true, existingToken: token })
  });
  const data = await res.json();
  if (!res.ok || data.error) { showToast('재발송 실패', true); return; }
  showToast(`${name}님께 링크가 재발송되었습니다.`);
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
